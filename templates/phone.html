<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AI予約 (Gemini Live API)</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            text-align: center; padding: 20px; background: #f0f2f5;
            min-height: 100vh; margin: 0;
            display: flex; flex-direction: column; align-items: center;
        }
        h2 { margin: 10px 0; }
        #status { font-size: 1.1rem; margin-bottom: 20px; color: #666; min-height: 1.5em; }
        .phone-btn {
            width: 200px; height: 200px; border-radius: 50%; border: none;
            font-size: 1.4rem; color: white; background: #34c759;
            box-shadow: 0 10px 25px rgba(52, 199, 89, 0.4); cursor: pointer;
            display: flex; align-items: center; justify-content: center; flex-direction: column;
            transition: all 0.3s ease;
            touch-action: manipulation;
            -webkit-tap-highlight-color: transparent;
        }
        .phone-btn.active { background: #ff3b30; box-shadow: 0 10px 25px rgba(255, 59, 48, 0.4); }
        .phone-btn .icon { font-size: 3rem; margin-bottom: 8px; }
        #log {
            width: 100%; max-width: 600px; margin-top: 30px;
            background: white; border-radius: 15px; padding: 15px;
            height: 320px; overflow-y: auto; text-align: left;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.05);
            -webkit-overflow-scrolling: touch;
        }
        .msg {
            margin-bottom: 8px; padding: 8px 12px; border-radius: 12px;
            max-width: 85%; line-height: 1.4; word-wrap: break-word;
        }
        .msg.user { background: #e9ecef; margin-left: auto; color: #333; }
        .msg.ai    { background: #007bff; color: white; margin-right: auto; }
        .msg.system { background: transparent; color: #888; font-size: 0.85rem; text-align: center; max-width: 100%; }
    </style>
</head>
<body>
    <h2>📞 AI予約 (Gemini Live API)</h2>
    <div id="status">開始ボタンをタップ</div>

    <button id="callBtn" class="phone-btn" onclick="toggleCall()">
        <span class="icon">📞</span>
        <span id="btnText">通話開始</span>
    </button>

    <div id="log"></div>

    <script>
        // Live API の音声フォーマット
        const INPUT_SAMPLE_RATE  = 16000;  // ブラウザ -> サーバー
        const OUTPUT_SAMPLE_RATE = 24000;  // サーバー -> ブラウザ

        // --- 状態 ---
        let ws = null;
        let isCallActive = false;

        // 入力 (マイク) 用 AudioContext
        let micContext = null;
        let micStream  = null;
        let micSource  = null;
        let micProcessor = null;

        // 出力 (再生) 用 AudioContext (24kHz)
        let playContext = null;
        let nextPlayTime = 0;     // 次に再生開始すべき時刻
        let activeSources = [];   // 現在再生中の BufferSource (割り込みで停止する用)

        // 文字起こし蓄積バッファ
        let userBuf = "";
        let aiBuf   = "";
        let userMsgDiv = null;
        let aiMsgDiv   = null;

        function toggleCall() {
            if (!isCallActive) startCall();
            else endCall();
        }

        async function startCall() {
            try {
                // AudioContext 初期化
                micContext  = new (window.AudioContext || window.webkitAudioContext)();
                await micContext.resume();
                playContext = new (window.AudioContext || window.webkitAudioContext)({ sampleRate: OUTPUT_SAMPLE_RATE });
                await playContext.resume();
                nextPlayTime = playContext.currentTime;

                // WebSocket 接続
                const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
                ws = new WebSocket(`${protocol}//${window.location.host}/ws`);
                ws.binaryType = "arraybuffer";

                ws.onopen = () => {
                    addSystemLog("接続成功");
                    document.getElementById('status').innerText = "通話中 🟢";
                    startRecording();
                };

                ws.onmessage = (event) => {
                    let data;
                    try { data = JSON.parse(event.data); }
                    catch (e) { console.error("JSON parse error", e); return; }
                    handleMessage(data);
                };

                ws.onerror = (e) => {
                    console.error("WebSocket error", e);
                    addSystemLog("WebSocket エラー");
                };

                ws.onclose = () => {
                    addSystemLog("切断");
                    document.getElementById('status').innerText = "通話終了";
                };

                isCallActive = true;
                updateUI(true);

            } catch (e) {
                console.error(e);
                alert("初期化エラー: " + e);
            }
        }

        function handleMessage(data) {
            switch (data.type) {
                case "audio":
                    playPCMChunk(data.audio);
                    break;
                case "user_transcript":
                    appendUserTranscript(data.text);
                    break;
                case "ai_transcript":
                    appendAITranscript(data.text);
                    break;
                case "interrupted":
                    stopAllPlayback();
                    break;
                case "turn_complete":
                    finalizeTurn();
                    break;
                case "error":
                    addSystemLog("エラー: " + data.message);
                    break;
                default:
                    console.log("unknown message", data);
            }
        }

        async function startRecording() {
            // OS / ブラウザの AEC + ノイズ抑制を有効化 (Live API のサーバー側 AEC と併用)
            micStream = await navigator.mediaDevices.getUserMedia({
                audio: {
                    echoCancellation: true,
                    noiseSuppression: true,
                    autoGainControl: true
                }
            });

            micSource = micContext.createMediaStreamSource(micStream);
            micProcessor = micContext.createScriptProcessor(2048, 1, 1);

            micSource.connect(micProcessor);
            micProcessor.connect(micContext.destination);

            micProcessor.onaudioprocess = (e) => {
                if (!isCallActive || !ws || ws.readyState !== WebSocket.OPEN) return;
                const inputData = e.inputBuffer.getChannelData(0);
                const downsampled = downsampleBuffer(inputData, micContext.sampleRate, INPUT_SAMPLE_RATE);
                const pcm16 = floatTo16BitPCM(downsampled);
                ws.send(pcm16);
            };
        }

        function endCall() {
            isCallActive = false;
            updateUI(false);

            try { if (ws && ws.readyState === WebSocket.OPEN) ws.send(JSON.stringify({ event: "stop" })); } catch (_) {}
            try { if (ws) ws.close(); } catch (_) {}
            ws = null;

            if (micProcessor) { try { micProcessor.disconnect(); } catch (_) {} micProcessor = null; }
            if (micSource)    { try { micSource.disconnect();    } catch (_) {} micSource = null; }
            if (micStream)    { micStream.getTracks().forEach(t => t.stop()); micStream = null; }
            if (micContext)   { try { micContext.close();   } catch (_) {} micContext = null; }

            stopAllPlayback();
            if (playContext)  { try { playContext.close();  } catch (_) {} playContext = null; }

            document.getElementById('status').innerText = "通話終了";
        }

        // ============================================================
        // 再生 (24kHz PCM)
        // ============================================================
        function playPCMChunk(base64Data) {
            if (!playContext) return;

            // base64 -> Uint8Array
            const binStr = atob(base64Data);
            const len = binStr.length;
            const bytes = new Uint8Array(len);
            for (let i = 0; i < len; i++) bytes[i] = binStr.charCodeAt(i);

            // 16-bit PCM little endian -> Float32 [-1, 1]
            const int16 = new Int16Array(bytes.buffer, bytes.byteOffset, bytes.byteLength / 2);
            const float32 = new Float32Array(int16.length);
            for (let i = 0; i < int16.length; i++) {
                float32[i] = int16[i] / 32768.0;
            }

            const audioBuffer = playContext.createBuffer(1, float32.length, OUTPUT_SAMPLE_RATE);
            audioBuffer.getChannelData(0).set(float32);

            const source = playContext.createBufferSource();
            source.buffer = audioBuffer;
            source.connect(playContext.destination);

            const startAt = Math.max(playContext.currentTime, nextPlayTime);
            source.start(startAt);
            nextPlayTime = startAt + audioBuffer.duration;

            activeSources.push(source);
            source.onended = () => {
                const idx = activeSources.indexOf(source);
                if (idx >= 0) activeSources.splice(idx, 1);
            };
        }

        function stopAllPlayback() {
            activeSources.forEach(s => { try { s.stop(); } catch (_) {} });
            activeSources = [];
            if (playContext) nextPlayTime = playContext.currentTime;
        }

        // ============================================================
        // 文字起こし表示
        // ============================================================
        function appendUserTranscript(text) {
            userBuf += text;
            if (!userMsgDiv) {
                userMsgDiv = document.createElement('div');
                userMsgDiv.className = 'msg user';
                document.getElementById('log').appendChild(userMsgDiv);
            }
            userMsgDiv.innerText = userBuf;
            scrollLog();
        }

        function appendAITranscript(text) {
            aiBuf += text;
            if (!aiMsgDiv) {
                aiMsgDiv = document.createElement('div');
                aiMsgDiv.className = 'msg ai';
                document.getElementById('log').appendChild(aiMsgDiv);
            }
            aiMsgDiv.innerText = aiBuf;
            scrollLog();
        }

        function finalizeTurn() {
            // ターン完了でバッファとアクティブな div 参照をクリア
            userBuf = "";
            aiBuf   = "";
            userMsgDiv = null;
            aiMsgDiv   = null;
        }

        // ============================================================
        // ユーティリティ
        // ============================================================
        function downsampleBuffer(buffer, sampleRate, outSampleRate) {
            if (outSampleRate === sampleRate) return buffer;
            if (outSampleRate > sampleRate)   return buffer;
            const ratio = sampleRate / outSampleRate;
            const newLength = Math.round(buffer.length / ratio);
            const result = new Float32Array(newLength);
            let offsetResult = 0;
            let offsetBuffer = 0;
            while (offsetResult < newLength) {
                const next = Math.round((offsetResult + 1) * ratio);
                let accum = 0, count = 0;
                for (let i = offsetBuffer; i < next && i < buffer.length; i++) {
                    accum += buffer[i];
                    count++;
                }
                result[offsetResult] = count > 0 ? accum / count : 0;
                offsetResult++;
                offsetBuffer = next;
            }
            return result;
        }

        function floatTo16BitPCM(buffer) {
            const out = new Int16Array(buffer.length);
            for (let i = 0; i < buffer.length; i++) {
                let s = Math.max(-1, Math.min(1, buffer[i]));
                out[i] = s < 0 ? s * 0x8000 : s * 0x7FFF;
            }
            return out.buffer;
        }

        function addSystemLog(text) {
            const div = document.createElement('div');
            div.className = 'msg system';
            div.innerText = text;
            document.getElementById('log').appendChild(div);
            scrollLog();
        }

        function scrollLog() {
            const log = document.getElementById('log');
            log.scrollTop = log.scrollHeight;
        }

        function updateUI(active) {
            const btn = document.getElementById('callBtn');
            const text = document.getElementById('btnText');
            if (active) {
                btn.classList.add('active');
                text.innerText = "切断";
            } else {
                btn.classList.remove('active');
                text.innerText = "通話開始";
            }
        }
    </script>
</body>
</html>
